name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command that failed
      placeholder: "e.g. npm run simulate -- --track senior-frontend --mode behavioral"
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: "e.g. mock, openai, anthropic, gemini"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened? Include the full error message.
    validations:
      required: true

  - type: textarea
    id: doctor-output
    attributes:
      label: Doctor output
      description: Run `npm run doctor` and paste the output here
      placeholder: Output of `npm run doctor`

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I ran `npm run doctor` and checked the output
          required: true
