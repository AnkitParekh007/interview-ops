name: Feature Request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea below.

  - type: dropdown
    id: type
    attributes:
      label: Feature type
      options:
        - New provider (Ollama, OpenRouter, Groq, etc.)
        - New interview track
        - New interview mode
        - New rubric
        - CLI improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      placeholder: What problem does this solve? What's missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should this work? What would the command or output look like?
    validations:
      required: true

  - type: checkboxes
    id: ethics
    attributes:
      label: Ethics check
      options:
        - label: This feature does not add live interview assistance
          required: true
        - label: This feature respects the ethical use policy in ETHICS.md
          required: true
